<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f7f7f4">
    <title>Tool Notes</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="assets/icon-192.png">
    <link rel="stylesheet" href="assets/styles.css?v=tool-icon">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">AI tool playbook</p>
        <h1>Tool Notes</h1>
      </div>
      <button class="icon-button" id="refreshButton" type="button" aria-label="Reload feed" title="Reload feed">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="M20 6v5h-5"></path>
          <path d="M4 18v-5h5"></path>
          <path d="M18.5 9A7 7 0 0 0 6 6.5L4 8.5"></path>
          <path d="M5.5 15A7 7 0 0 0 18 17.5l2-2"></path>
        </svg>
      </button>
    </header>

    <main>
      <section class="controls" aria-label="Feed controls">
        <div class="control-panel">
          <div class="control-row">
            <div class="sort-tabs" aria-label="Sort order">
              <button class="text-button active" id="newestSortButton" type="button">
                <svg aria-hidden="true" viewBox="0 0 24 24">
                  <path d="M12 6v6l4 2"></path>
                  <circle cx="12" cy="12" r="9"></circle>
                </svg>
                <span>Newest</span>
              </button>
              <button class="text-button" id="popularSortButton" type="button">
                <svg aria-hidden="true" viewBox="0 0 24 24">
                  <path d="M4 14l5-5 4 4 7-7"></path>
                  <path d="M15 6h5v5"></path>
                </svg>
                <span>Popular</span>
              </button>
            </div>
            <button class="filter-button" id="filterToggleButton" type="button">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M4 7h16"></path>
                <path d="M7 12h10"></path>
                <path d="M10 17h4"></path>
              </svg>
              <span>Filters</span>
              <span class="filter-badge hidden" id="filterBadge">0</span>
            </button>
          </div>

          <label class="search-box">
            <span class="visually-hidden">Search</span>
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <circle cx="11" cy="11" r="7"></circle>
              <path d="M20 20l-3.5-3.5"></path>
            </svg>
            <input id="searchInput" type="search" placeholder="Search tips, workflows, tools...">
          </label>

          <div class="status-row">
            <button class="text-button active" id="allItemsButton" type="button">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M8 6h13"></path>
                <path d="M8 12h13"></path>
                <path d="M8 18h13"></path>
                <path d="M3 6h.01"></path>
                <path d="M3 12h.01"></path>
                <path d="M3 18h.01"></path>
              </svg>
              <span>All</span>
            </button>
            <button class="text-button" id="savedItemsButton" type="button">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M19 21l-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
              </svg>
              <span>Saved</span>
            </button>
          </div>
          <div class="active-filters hidden" id="activeFilters"></div>
        </div>
      </section>

      <section class="summary">
        <div>
          <span id="itemCount">0</span>
          <span>notes</span>
        </div>
        <p id="lastUpdated">Loading feed...</p>
      </section>

      <section class="new-picks hidden" id="newPicks" aria-label="New popular picks">
        <div class="new-picks-header">
          <div>
            <p class="eyebrow">Since last visit</p>
            <h2>New picks</h2>
          </div>
          <button class="ghost-button compact" id="markSeenButton" type="button">Mark seen</button>
        </div>
        <div class="new-picks-list" id="newPicksList"></div>
      </section>

      <section class="feed" id="feed" aria-live="polite"></section>
      <section class="empty-state hidden" id="emptyState">
        <h2>No notes found</h2>
        <p>Try another category, type, or search term.</p>
      </section>
    </main>

    <div class="sheet-backdrop hidden" id="filterBackdrop"></div>
    <section class="filter-sheet hidden" id="filterSheet" aria-label="Filters">
      <div class="sheet-handle" aria-hidden="true"></div>
      <div class="sheet-header">
        <div>
          <p class="eyebrow">Refine feed</p>
          <h2>Filters</h2>
        </div>
        <button class="icon-button sheet-close" id="filterCloseButton" type="button" aria-label="Close filters">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M6 6l12 12"></path>
            <path d="M18 6L6 18"></path>
          </svg>
        </button>
      </div>

      <div class="filter-section">
        <p class="filter-label">Sources</p>
        <div class="chip-row source-row" id="sourceFilters" aria-label="Sources"></div>
      </div>
      <div class="filter-section">
        <p class="filter-label">Tools</p>
        <div class="chip-row wrap" id="categoryFilters" aria-label="Categories"></div>
      </div>
      <div class="filter-section">
        <p class="filter-label">Types</p>
        <div class="chip-row wrap" id="typeFilters" aria-label="Types"></div>
      </div>

      <div class="sheet-actions">
        <button class="ghost-button" id="clearFiltersButton" type="button">Reset</button>
        <button class="primary-button" id="filterDoneButton" type="button">Done</button>
      </div>
    </section>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="assets/app.js?v=tool-icon" defer></script>
  </body>
</html>
