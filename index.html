<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#070a12">
    <title>Tool Notes</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="assets/icon-192.png">
    <link rel="stylesheet" href="assets/styles.css">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23212a31'/%3E%3Cpath d='M17 18h30v6H17zm0 11h30v6H17zm0 11h18v6H17z' fill='%23f4d35e'/%3E%3C/svg%3E">
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">AI tool playbook</p>
        <h1>Tool Notes</h1>
      </div>
      <button class="icon-button" id="refreshButton" type="button" aria-label="Reload feed" title="Reload feed">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="M20 6v5h-5"></path>
          <path d="M4 18v-5h5"></path>
          <path d="M18.5 9A7 7 0 0 0 6 6.5L4 8.5"></path>
          <path d="M5.5 15A7 7 0 0 0 18 17.5l2-2"></path>
        </svg>
      </button>
    </header>

    <main>
      <section class="controls" aria-label="Feed controls">
        <div class="control-panel">
          <div class="control-row">
            <div class="sort-tabs" aria-label="Sort order">
              <button class="text-button active" id="newestSortButton" type="button">Newest</button>
              <button class="text-button" id="popularSortButton" type="button">Popular</button>
            </div>
            <button class="filter-button" id="filterToggleButton" type="button">
              <span>Filters</span>
              <span class="filter-badge hidden" id="filterBadge">0</span>
            </button>
          </div>

          <label class="search-box">
            <span class="visually-hidden">Search</span>
            <input id="searchInput" type="search" placeholder="Search tips, workflows, tools...">
          </label>

          <div class="status-row">
            <button class="text-button active" id="allItemsButton" type="button">All</button>
            <button class="text-button" id="savedItemsButton" type="button">Saved</button>
          </div>
          <div class="active-filters hidden" id="activeFilters"></div>
        </div>
      </section>

      <section class="summary">
        <div>
          <span id="itemCount">0</span>
          <span>notes</span>
        </div>
        <p id="lastUpdated">Loading feed...</p>
      </section>

      <section class="feed" id="feed" aria-live="polite"></section>
      <section class="empty-state hidden" id="emptyState">
        <h2>No notes found</h2>
        <p>Try another category, type, or search term.</p>
      </section>
    </main>

    <div class="sheet-backdrop hidden" id="filterBackdrop"></div>
    <section class="filter-sheet hidden" id="filterSheet" aria-label="Filters">
      <div class="sheet-handle" aria-hidden="true"></div>
      <div class="sheet-header">
        <div>
          <p class="eyebrow">Refine feed</p>
          <h2>Filters</h2>
        </div>
        <button class="icon-button sheet-close" id="filterCloseButton" type="button" aria-label="Close filters">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M6 6l12 12"></path>
            <path d="M18 6L6 18"></path>
          </svg>
        </button>
      </div>

      <div class="filter-section">
        <p class="filter-label">Sources</p>
        <div class="chip-row source-row" id="sourceFilters" aria-label="Sources"></div>
      </div>
      <div class="filter-section">
        <p class="filter-label">Tools</p>
        <div class="chip-row wrap" id="categoryFilters" aria-label="Categories"></div>
      </div>
      <div class="filter-section">
        <p class="filter-label">Types</p>
        <div class="chip-row wrap" id="typeFilters" aria-label="Types"></div>
      </div>

      <div class="sheet-actions">
        <button class="ghost-button" id="clearFiltersButton" type="button">Reset</button>
        <button class="primary-button" id="filterDoneButton" type="button">Done</button>
      </div>
    </section>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="assets/app.js" defer></script>
  </body>
</html>
